- name: Check whether this node has already been initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: Run kubeadm init (idempotent guard via admin.conf check above)
  ansible.builtin.command: >
    kubeadm init
    --apiserver-advertise-address={{ ansible_default_ipv4.address }}
    --control-plane-endpoint={{ ansible_default_ipv4.address }}
    --pod-network-cidr={{ pod_network_cidr }}
    --node-name={{ inventory_hostname }}
  when: not admin_conf.stat.exists
  register: kubeadm_init

- name: Create .kube directory for the ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Copy admin.conf into the ubuntu user's kubeconfig
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Fetch admin.conf to the Ansible controller for local kubectl/Helm/ArgoCD use
  ansible.builtin.fetch:
    src: /etc/kubernetes/admin.conf
    dest: "{{ playbook_dir }}/fetched/admin.conf"
    flat: true

- name: Check whether Calico is already applied
  ansible.builtin.command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get ns calico-system
  register: calico_check
  failed_when: false
  changed_when: false

- name: Install the Calico CNI
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f {{ calico_manifest_url }}
  when: calico_check.rc != 0

- name: Wait for all system pods to be running before generating the join token
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf wait --for=condition=Ready nodes --all --timeout=300s
  changed_when: false

- name: Generate the worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false

- name: Store the join command as a fact so the workers play can read it
  ansible.builtin.set_fact:
    join_command: "{{ join_command_raw.stdout }}"
